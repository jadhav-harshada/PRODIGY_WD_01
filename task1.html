<!DOCTYPE html>
<html>
<head>
<title>Interactive Navigation Menu</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

/* Navigation Bar */
.navbar{
position:fixed;
top:0;
width:100%;
background:#333;
padding:15px;
text-align:center;
transition:0.4s;
}

/* Menu Links */
.navbar a{
color:white;
text-decoration:none;
margin:20px;
font-size:18px;
padding:8px;
}

/* Hover Effect */
.navbar a:hover{
background:orange;
color:black;
border-radius:5px;
}

/* Scroll Effect */
.scrolled{
background:#0077cc;
}

/* Page Sections */
.section{
height:600px;
padding-top:80px;
text-align:center;
}

#home{background:#f2f2f2;}
#about{background:#d9f2ff;}
#services{background:#ffe6cc;}
#contact{background:#e6ffe6;}

</style>

</head>

<body>

<!-- Navigation Menu -->
<div class="navbar" id="navbar">
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</div>

<!-- Sections -->
<div class="section" id="home">
<h1>Home Page</h1>
<p>Welcome to the Home Section</p>
</div>

<div class="section" id="about">
<h1>About Page</h1>
<p>This is the About Section</p>
</div>

<div class="section" id="services">
<h1>Services Page</h1>
<p>This is the Services Section</p>
</div>

<div class="section" id="contact">
<h1>Contact Page</h1>
<p>This is the Contact Section</p>
</div>

<script>

/* Scroll Effect for Navbar */

window.onscroll = function(){

let navbar = document.getElementById("navbar");

if(window.scrollY > 50)
{
navbar.classList.add("scrolled");
}
else
{
navbar.classList.remove("scrolled");
}

};

</script>

</body>
</html>
